name: "📄 Missing Paper"
description: Suggest a paper that should be included in the review
labels: ["missing-paper", "needs-triage"]
body:
  - type: input
    id: doi
    attributes:
      label: Paper DOI
      description: The DOI of the paper you think is missing.
      placeholder: "10.1038/s41586-024-..."
    validations:
      required: true

  - type: input
    id: citation
    attributes:
      label: Paper reference
      description: "Author(s), year, title, journal — however much you know."
      placeholder: "Smith et al. 2025, Nature Neuroscience"
    validations:
      required: false

  - type: input
    id: section
    attributes:
      label: Which section should cite this paper?
      description: Section number or title, or "Not sure" if uncertain.
      placeholder: "Section number or title"
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: How does this paper affect the review?
      options:
        - "Supports an existing claim (additional evidence)"
        - "Contradicts an existing claim (new conflict)"
        - "Resolves an existing conflict"
        - "Covers a topic not currently discussed"
        - "Updates findings with newer/better data"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Why should this paper be included?
      description: Brief explanation of what the paper found and why it matters for this review.
      placeholder: "This paper shows that... which is relevant because..."
    validations:
      required: true
